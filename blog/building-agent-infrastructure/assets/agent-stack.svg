<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <style>
    .layer-box { fill: #2a2a2a; stroke: #4a4a4a; stroke-width: 2; }
    .layer-name { font-family: 'SF Mono', 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #60a5fa; }
    .layer-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #a0a0a0; }
    .arrow { stroke: #4ade80; stroke-width: 2; fill: none; }
    .arrow-head { fill: #4ade80; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 24px; font-weight: bold; fill: #e0e0e0; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; fill: #707070; }
  </style>

  <rect width="800" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" class="title">Agent Infrastructure Stack</text>

  <!-- Layer 5: llm-gent -->
  <rect x="100" y="70" width="600" height="60" rx="6" class="layer-box"/>
  <text x="130" y="107" class="layer-name">llm-gent</text>
  <text x="280" y="107" class="layer-desc">Agent orchestration and deployment</text>

  <!-- Arrow from llm-saia to llm-gent -->
  <line x1="400" y1="155" x2="400" y2="135" class="arrow"/>
  <polygon points="400,130 395,140 405,140" class="arrow-head"/>

  <!-- Layer 4: llm-saia -->
  <rect x="100" y="155" width="600" height="60" rx="6" class="layer-box"/>
  <text x="130" y="192" class="layer-name">llm-saia</text>
  <text x="280" y="192" class="layer-desc">Protocol layer with typed verbs for agent communication</text>

  <!-- Arrow from llm-kelt to llm-saia -->
  <line x1="400" y1="240" x2="400" y2="220" class="arrow"/>
  <polygon points="400,215 395,225 405,225" class="arrow-head"/>

  <!-- Layer 3: llm-kelt -->
  <rect x="100" y="240" width="600" height="60" rx="6" class="layer-box"/>
  <text x="130" y="277" class="layer-name">llm-kelt</text>
  <text x="280" y="277" class="layer-desc">Training pipelines—SFT, DPO, LoRA adapters</text>

  <!-- Arrow from llm-infer to llm-kelt -->
  <line x1="400" y1="325" x2="400" y2="305" class="arrow"/>
  <polygon points="400,300 395,310 405,310" class="arrow-head"/>

  <!-- Layer 2: llm-infer -->
  <rect x="100" y="325" width="600" height="60" rx="6" class="layer-box"/>
  <text x="130" y="362" class="layer-name">llm-infer</text>
  <text x="280" y="362" class="layer-desc">Unified inference across vLLM, local, and cloud</text>

  <!-- Arrow from appinfra to llm-infer -->
  <line x1="400" y1="410" x2="400" y2="390" class="arrow"/>
  <polygon points="400,385 395,395 405,395" class="arrow-head"/>

  <!-- Layer 1: appinfra -->
  <rect x="100" y="410" width="600" height="60" rx="6" class="layer-box"/>
  <text x="130" y="447" class="layer-name">appinfra</text>
  <text x="280" y="447" class="layer-desc">Config, logging, lifecycle—the foundation layer</text>

</svg>
